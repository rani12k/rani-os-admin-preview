<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RANI OS Admin Preview V2</title>
<style>
:root{--bg:#07111f;--card:#0d1b2e;--card2:#11243a;--text:#e8eef7;--muted:#9fb0c7;--border:#223855;--ok:#36d399;--warn:#fbbf24;--bad:#fb7185;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}header{padding:18px;background:#08162a;border-bottom:1px solid var(--border)}h1{margin:0 0 6px;font-size:25px}.sub{color:var(--muted);font-size:14px}main{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}.full{grid-column:1/-1}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.kpi{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px}.kpi .num{font-size:24px;font-weight:bold;color:var(--blue)}.kpi .txt{color:var(--muted);font-size:13px}h2{margin:0 0 10px;font-size:17px}.row{display:grid;grid-template-columns:150px 1fr;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}.label{color:var(--muted)}.value{direction:ltr;text-align:left;overflow-wrap:anywhere}.chip{display:inline-block;padding:4px 8px;border:1px solid var(--border);border-radius:999px;margin:2px;background:var(--card2)}.pass{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}table{width:100%;border-collapse:collapse;direction:ltr;text-align:left}th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}th{color:var(--muted);font-weight:normal}@media(max-width:820px){main{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.row{grid-template-columns:1fr}.value{text-align:right}table{font-size:13px}}
</style>
</head>
<body>
<header><h1>RANI OS Admin Preview V2</h1><div class="sub">Sanitized public dashboard · task status · gates · summaries · no private repository data</div></header>
<main>
<section class="full"><h2>Status</h2><div class="pass">Preview loaded · Dashboard completeness V2</div></section>
<section class="full"><h2>Summary</h2><div class="kpis" id="kpis"></div></section>
<section><h2>Runtime</h2><div id="runtime"></div></section>
<section><h2>Current Work</h2><div id="current_work"></div></section>
<section class="full"><h2>Task List</h2><div id="tasks"></div></section>
<section><h2>Lane Status</h2><div id="lanes"></div></section>
<section><h2>Owner Gates</h2><div id="gates"></div></section>
<section><h2>Traceability</h2><div id="trace"></div></section>
<section><h2>Repository Boundary</h2><div id="repository"></div></section>
<section class="full"><h2>Next Actions</h2><div id="next_actions"></div></section>
</main>
<script>
const state={summary:{total_tasks:12,pass:9,needs_fix:1,owner_gates:1,parked:1},runtime:{mode:'deterministic_infrastructure_execution',contract:'RTM-067',status:'active',source:'sanitized public preview'},current_work:{active_work_item:'Admin Web dashboard completeness',last_completed_work_item:'Public preview V1 published',current_phase:'Public Preview Review',owner_gate:'Visual review',parked_work:['Trading Evidence']},tasks:[{id:'RTM-067',name:'Universal Deterministic Interaction Kernel',status:'PASS',lane:'Runtime',next:'Keep active'},{id:'BUNDLE-002',name:'Infrastructure Execution Bundle 002',status:'PASS',lane:'Infrastructure',next:'Complete'},{id:'BRIDGE-001',name:'Controlled Executor Bridge Proof Slice',status:'PASS',lane:'Bridge',next:'Continue'},{id:'WEB-SCHEMA-V1',name:'Admin Web State Schema',status:'PASS',lane:'WEB/Admin',next:'Use as state contract'},{id:'WEB-SHELL-V3',name:'Admin Web UI Shell V3',status:'NEEDS FIX',lane:'WEB/Admin',next:'Add full dashboard data'},{id:'PUBLIC-PREVIEW',name:'Public sanitized preview repo',status:'PASS',lane:'WEB/Admin',next:'Visual review'},{id:'TRACEABILITY',name:'Traceability records',status:'PARTIAL',lane:'Evidence',next:'Expand task trace table'},{id:'REGISTER-INDEX',name:'Register/index reconciliation',status:'PARTIAL',lane:'Repository',next:'Reconcile canonical files later'},{id:'PAGES',name:'GitHub Pages private repo path',status:'BLOCKED',lane:'Hosting',next:'Use public preview repo'},{id:'TRADING-EVIDENCE',name:'Trading Evidence',status:'PARKED',lane:'Application',next:'Do not run yet'},{id:'OWNER-REVIEW',name:'Owner visual review',status:'OWNER GATE',lane:'Decision',next:'PASS / NEEDS FIX'},{id:'NEXT',name:'Dashboard data completeness',status:'ACTIVE NEXT',lane:'WEB/Admin',next:'Implement V2'}],lanes:[{name:'Runtime',status:'PASS',count:3},{name:'Bridge',status:'PASS',count:2},{name:'WEB/Admin',status:'ACTIVE',count:5},{name:'Traceability',status:'PARTIAL',count:2},{name:'Application',status:'PARKED',count:1}],gates:[{gate:'Owner visual review',status:'OPEN',decision:'PASS / NEEDS FIX'},{gate:'Trading Evidence',status:'PARKED',decision:'Not now'},{gate:'Private repository publication',status:'REJECTED',decision:'Use public sanitized repo'}],trace:[{id:'TRACE-001',event:'Preview V1 published',result:'PASS'},{id:'TRACE-002',event:'Owner found missing dashboard data',result:'NEEDS FIX'},{id:'TRACE-003',event:'Preview V2 dashboard completeness',result:'IN REVIEW'}],repository:{public_preview:'sanitized only',private_source:'not included',secrets:'not included',tokens:'not included',trading_evidence:'not included'},next_actions:[{id:'NEXT-001',label:'Owner reviews V2 dashboard and returns PASS or NEEDS FIX',lane:'WEB/Admin',recommended:true,status:'ready'},{id:'NEXT-002',label:'If NEEDS FIX, patch the specific missing panel',lane:'WEB/Admin',recommended:false,status:'ready'}]};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function val(v){if(v===null||v===undefined||v==='')return'unknown';if(Array.isArray(v))return v.length?v.map(x=>`<span class='chip'>${esc(x)}</span>`).join(' '):'None';if(typeof v==='object')return `<pre>${esc(JSON.stringify(v,null,2))}</pre>`;return esc(v)}function rows(o){return Object.entries(o||{}).map(([k,v])=>`<div class='row'><div class='label'>${esc(k)}</div><div class='value'>${val(v)}</div></div>`).join('')||'unknown'}function table(list,cols){return `<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${list.map(r=>`<tr>${cols.map(c=>`<td>${val(r[c]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
document.getElementById('kpis').innerHTML=Object.entries(state.summary).map(([k,v])=>`<div class='kpi'><div class='num'>${v}</div><div class='txt'>${esc(k)}</div></div>`).join('');['runtime','current_work','repository'].forEach(k=>document.getElementById(k).innerHTML=rows(state[k]));document.getElementById('tasks').innerHTML=table(state.tasks,['id','name','status','lane','next']);document.getElementById('lanes').innerHTML=table(state.lanes,['name','status','count']);document.getElementById('gates').innerHTML=table(state.gates,['gate','status','decision']);document.getElementById('trace').innerHTML=table(state.trace,['id','event','result']);document.getElementById('next_actions').innerHTML=table(state.next_actions,['id','label','lane','recommended','status']);
</script>
</body>
</html>
