<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Admin Preview</title>
<style>
:root{--bg:#07111f;--card:#0d1b2e;--text:#e8eef7;--muted:#9fb0c7;--border:#223855;--ok:#36d399;--warn:#fbbf24;--bad:#fb7185}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}header{padding:18px;background:#08162a;border-bottom:1px solid var(--border)}h1{margin:0 0 6px;font-size:24px}.sub{color:var(--muted);font-size:14px}main{padding:16px;display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}.full{grid-column:1/-1}h2{margin:0 0 10px;font-size:17px}.row{display:grid;grid-template-columns:170px 1fr;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}.label{color:var(--muted)}.value{direction:ltr;text-align:left;overflow-wrap:anywhere}.chip{display:inline-block;padding:4px 8px;border:1px solid var(--border);border-radius:999px;margin:2px}.pass{color:var(--ok)}.warn{color:var(--warn)}@media(max-width:820px){main{grid-template-columns:1fr}.row{grid-template-columns:1fr}.value{text-align:right}}
</style>
</head>
<body>
<header><h1>RANI OS Admin Preview</h1><div class="sub">Sanitized public preview · no private repository data</div></header>
<main>
<section class="full"><h2>Status</h2><div class="pass">Preview loaded · Schema keys PASS</div></section>
<section><h2>Runtime</h2><div id="runtime"></div></section>
<section><h2>Current Work</h2><div id="current_work"></div></section>
<section><h2>Execution Queue</h2><div id="execution_queue"></div></section>
<section><h2>Approvals</h2><div id="approvals"></div></section>
<section><h2>Repository Boundary</h2><div id="repository"></div></section>
<section class="full"><h2>Next Actions</h2><div id="next_actions"></div></section>
</main>
<script>
const state={runtime:{mode:'deterministic_infrastructure_execution',contract:'RTM-067',status:'active'},current_work:{active_work_item:'None',last_completed_work_item:'Admin Web Preview Package',current_phase:'Public Preview Review',owner_gate:'Visual review',parked_work:['Trading Evidence']},execution_queue:{primary_lane:'WEB/Admin visual review',supporting_lanes:['Preview only'],parked_lanes:['Private repository data'],blocked_lanes:[],completed_recent:['Sanitized preview prepared']},approvals:{current_gate:'Owner visual review',approved_scope:['Public preview UI only'],not_approved_scope:['Private RANI_OS publication'],required_owner_action:'PASS / NEEDS FIX'},repository:{public_preview:'sanitized only',private_source:'not included',secrets:'not included',tokens:'not included'},next_actions:[{id:'NEXT-001',label:'Owner opens preview and returns PASS or NEEDS FIX',lane:'WEB/Admin',recommended:true,requires_owner_gate:true,status:'ready'}]};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function val(v){if(v===null||v===undefined||v==='')return'unknown';if(Array.isArray(v))return v.length?v.map(x=>`<span class='chip'>${esc(x)}</span>`).join(' '):'None';if(typeof v==='object')return `<pre>${esc(JSON.stringify(v,null,2))}</pre>`;return esc(v)}function rows(o){return Object.entries(o||{}).map(([k,v])=>`<div class='row'><div class='label'>${esc(k)}</div><div class='value'>${val(v)}</div></div>`).join('')||'unknown'}['runtime','current_work','execution_queue','approvals','repository'].forEach(k=>document.getElementById(k).innerHTML=rows(state[k]));document.getElementById('next_actions').innerHTML=state.next_actions.map(rows).join('');
</script>
</body>
</html>
