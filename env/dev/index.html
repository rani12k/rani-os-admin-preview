<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Admin DEV Environment</title>
<style>
body{margin:0;background:#07111f;color:#e8eef7;font-family:Arial,sans-serif;padding:24px}
.loading{border:1px solid #223855;background:#0d1b2e;border-radius:14px;padding:16px}
</style>
</head>
<body>
<div class="loading">Loading RANI OS Admin DEV Environment...</div>
<script>
window.RANI_ENV = {
  "environment": "DEV",
  "app": "ADMIN_WEB",
  "build": "CR-016-MOBILE-002",
  "capability_mode": "experimental",
  "data_scope": "public_sanitized",
  "owner_gate_required": false,
  "writes_allowed": false,
  "banner": "DEV environment — review only. No production actions."
};
</script>
<script src="../../app-cr016.js?build=dev-mobile-compact-001"></script>
<script>
(function applyDevMobileCompactOverlay(){
  const css = `
@media(max-width:820px){
  body{font-size:15px!important;line-height:1.35!important;overflow-x:hidden!important}
  .env-bar{padding:6px 8px!important;font-size:11px!important}
  .env-bar-title{font-size:11px!important;letter-spacing:.03em!important}
  .env-bar-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:4px!important;margin-top:4px!important}
  .env-bar-item{padding:5px!important;border-radius:8px!important;min-width:0!important}
  .env-bar-item:nth-child(n+5){display:none!important}
  header{padding:10px 8px!important}
  header h1{font-size:20px!important;line-height:1.15!important}
  header .sub{font-size:11px!important;line-height:1.25!important}
  .apps,.tabs{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:7px!important;margin-top:8px!important}
  .appbtn,.tabs button{padding:9px!important;min-height:46px!important;font-size:12px!important;text-align:center!important}
  .counters,.kpis,.cards{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:7px!important}
  .counter,.kpi,.card{padding:9px!important;min-height:58px!important}
  .num{font-size:18px!important}
  main{padding:8px!important;gap:9px!important}
  section,.panel,.mini{padding:10px!important;border-radius:13px!important}
  .env-center{max-height:72px!important;overflow:hidden!important;position:relative!important;padding:10px!important;margin-top:8px!important;cursor:pointer!important}
  .env-center:after{content:'Environment Center — tap to expand';position:absolute;left:0;right:0;bottom:0;padding:8px;background:linear-gradient(180deg,rgba(13,27,46,0),rgba(13,27,46,.98));color:#60a5fa;font-size:11px;font-weight:800;text-align:center!important}
  .env-center.dev-expanded{max-height:none!important;overflow:visible!important}
  .env-center.dev-expanded:after{content:'Environment Center — tap to collapse';position:static;display:block;margin-top:6px;background:rgba(96,165,250,.12);border-radius:8px}
  .env-center h2{font-size:15px!important;margin:0!important}
  .env-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:6px!important}
  .env-item{padding:6px!important;border-radius:8px!important}
  .env-banner{display:none!important}
  .mobile-card{padding:11px!important;font-size:14px!important;gap:8px!important}
  .mobile-label{font-size:10px!important}
  .legend{gap:4px!important}
  .chip{font-size:10px!important;padding:3px 6px!important}
}`;
  function install(){
    if(!document.getElementById('dev-mobile-compact-001')){
      const style=document.createElement('style');
      style.id='dev-mobile-compact-001';
      style.textContent=css;
      document.head.appendChild(style);
    }
    document.querySelectorAll('.env-center').forEach(center=>{
      if(center.dataset.devCompactBound)return;
      center.dataset.devCompactBound='1';
      center.addEventListener('click',()=>center.classList.toggle('dev-expanded'));
    });
  }
  install();
  document.addEventListener('DOMContentLoaded',install);
  setInterval(install,500);
})();
</script>
</body>
</html>
