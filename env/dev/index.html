<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Admin DEV Environment</title>
<style>
body{margin:0;background:#07111f;color:#e8eef7;font-family:Arial,sans-serif;padding:24px}
.loading{border:1px solid #223855;background:#0d1b2e;border-radius:14px;padding:16px}
</style>
</head>
<body>
<div class="loading">Loading RANI OS Admin DEV Environment...</div>
<script>
window.RANI_ENV = {
  "environment": "DEV",
  "app": "ADMIN_WEB",
  "build": "CR-016-MOBILE-002",
  "capability_mode": "experimental",
  "data_scope": "public_sanitized",
  "owner_gate_required": false,
  "writes_allowed": false,
  "banner": "DEV environment — review only. No production actions."
};
</script>
<script src="../../app-cr016.js?build=dev-mobile-compact-002"></script>
<script>
(function applyDevMobileCompactOverlay(){
  const css = `
@media(max-width:820px){
  html,body{max-width:100%!important;overflow-x:hidden!important}
  body{font-size:15px!important;line-height:1.35!important;background:#07111f!important}
  .env-bar{padding:6px 8px!important;font-size:11px!important;position:sticky!important;top:0!important;z-index:80!important}
  .env-bar-title{font-size:11px!important;letter-spacing:.03em!important;line-height:1.1!important}
  .env-bar-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:4px!important;margin-top:4px!important}
  .env-bar-item{padding:5px!important;border-radius:8px!important;min-width:0!important}
  .env-bar-item:nth-child(n+5){display:none!important}
  header{padding:8px 8px!important}
  header h1{font-size:18px!important;line-height:1.1!important;margin-bottom:2px!important}
  header .sub{font-size:10px!important;line-height:1.18!important;max-height:24px!important;overflow:hidden!important;opacity:.85!important}
  .apps,.tabs{display:flex!important;grid-template-columns:none!important;gap:6px!important;margin-top:7px!important;overflow-x:auto!important;overflow-y:hidden!important;scroll-snap-type:x proximity!important;-webkit-overflow-scrolling:touch!important;scrollbar-width:none!important;padding-bottom:2px!important}
  .apps::-webkit-scrollbar,.tabs::-webkit-scrollbar{display:none!important}
  .appbtn,.tabs button{flex:0 0 auto!important;min-width:88px!important;max-width:116px!important;padding:8px 7px!important;min-height:38px!important;font-size:11px!important;line-height:1.15!important;text-align:center!important;scroll-snap-align:start!important;white-space:normal!important}
  .counters,.kpis,.cards{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:7px!important;margin-top:8px!important}
  .counter,.kpi,.card{padding:8px!important;min-height:52px!important;border-radius:11px!important}
  .num{font-size:17px!important;line-height:1.1!important}
  .label,.txt{font-size:10px!important;line-height:1.18!important}
  main{padding:7px!important;gap:8px!important}
  section,.panel,.mini{padding:9px!important;border-radius:12px!important}
  section h2,.panel h2,.mini h2{font-size:17px!important;line-height:1.15!important;margin-top:0!important}
  .env-center{max-height:56px!important;overflow:hidden!important;position:relative!important;padding:9px!important;margin-top:7px!important;cursor:pointer!important}
  .env-center:after{content:'Environment Center — tap to expand';position:absolute;left:0;right:0;bottom:0;padding:7px;background:linear-gradient(180deg,rgba(13,27,46,0),rgba(13,27,46,.98));color:#60a5fa;font-size:10px;font-weight:800;text-align:center!important}
  .env-center.dev-expanded{max-height:none!important;overflow:visible!important}
  .env-center.dev-expanded:after{content:'Environment Center — tap to collapse';position:static;display:block;margin-top:6px;background:rgba(96,165,250,.12);border-radius:8px}
  .env-center h2{font-size:14px!important;margin:0!important;line-height:1.1!important}
  .env-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:5px!important}
  .env-item{padding:6px!important;border-radius:8px!important;min-width:0!important}
  .env-value{font-size:11px!important;line-height:1.15!important;overflow-wrap:anywhere!important}
  .env-banner{display:none!important}
  .mobile-card{padding:10px!important;font-size:14px!important;gap:7px!important;border-radius:13px!important}
  .mobile-label{font-size:9px!important;letter-spacing:.04em!important}
  .mobile-value{font-size:13px!important;line-height:1.28!important}
  .legend{display:flex!important;gap:4px!important;flex-wrap:nowrap!important;overflow-x:auto!important;scrollbar-width:none!important}
  .legend::-webkit-scrollbar{display:none!important}
  .chip{font-size:10px!important;padding:3px 6px!important;white-space:nowrap!important}
  .tablewrap{max-width:100%!important;overflow-x:auto!important}
  table{font-size:10px!important;line-height:1.2!important}
  th,td{padding:5px 4px!important}
}`;
  function install(){
    if(!document.getElementById('dev-mobile-compact-002')){
      const style=document.createElement('style');
      style.id='dev-mobile-compact-002';
      style.textContent=css;
      document.head.appendChild(style);
    }
    document.querySelectorAll('.env-center').forEach(center=>{
      if(center.dataset.devCompactBound)return;
      center.dataset.devCompactBound='1';
      center.addEventListener('click',()=>center.classList.toggle('dev-expanded'));
    });
  }
  install();
  document.addEventListener('DOMContentLoaded',install);
  setInterval(install,500);
})();
</script>
</body>
</html>
