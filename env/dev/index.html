<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Admin DEV Environment</title>
<style>
body{margin:0;background:#07111f;color:#e8eef7;font-family:Arial,sans-serif;padding:24px}
.loading{border:1px solid #223855;background:#0d1b2e;border-radius:14px;padding:16px}
</style>
</head>
<body>
<div class="loading">Loading RANI OS Admin DEV Environment...</div>
<script>
window.RANI_ENV = {
  "environment": "DEV",
  "app": "ADMIN_WEB",
  "build": "CR-016-MOBILE-002",
  "capability_mode": "experimental",
  "data_scope": "public_sanitized",
  "owner_gate_required": false,
  "writes_allowed": false,
  "banner": "DEV environment — review only. No production actions."
};
</script>
<script src="../../app-cr016.js?build=dev-table-readability-001"></script>
<script>
(function applyDevTableReadabilityFix(){
  const css = `
@media(max-width:820px){
  .tablewrap{overflow-x:auto!important;overflow-y:visible!important;-webkit-overflow-scrolling:touch!important;max-width:100%!important}
  .tablewrap table{min-width:760px!important;width:max-content!important;table-layout:auto!important;border-collapse:collapse!important}
  .tablewrap th,.tablewrap td{min-width:84px!important;max-width:220px!important;white-space:normal!important;word-break:normal!important;overflow-wrap:break-word!important;vertical-align:top!important;line-height:1.28!important;font-size:12px!important}
  .tablewrap th:first-child,.tablewrap td:first-child{min-width:96px!important}
  .tablewrap th:last-child,.tablewrap td:last-child{min-width:180px!important}
}`;
  function install(){
    if(document.getElementById('dev-table-readability-001'))return;
    const style=document.createElement('style');
    style.id='dev-table-readability-001';
    style.textContent=css;
    document.head.appendChild(style);
  }
  install();
  document.addEventListener('DOMContentLoaded',install);
})();
</script>
</body>
</html>
