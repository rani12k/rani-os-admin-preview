<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Admin Control Room</title>
<style>
:root{--bg:#07111f;--card:#0d1b2e;--card2:#11243a;--text:#e8eef7;--muted:#9fb0c7;--border:#223855;--ok:#36d399;--warn:#fbbf24;--bad:#fb7185;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;line-height:1.4}header{padding:16px;background:#08162a;border-bottom:1px solid var(--border)}h1{margin:0 0 4px;font-size:24px}.sub{color:var(--muted);font-size:14px}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.nav a{padding:8px 11px;border:1px solid var(--border);border-radius:999px;background:var(--card2);color:var(--text);text-decoration:none;font-size:13px}main{padding:14px;display:grid;gap:12px;grid-template-columns:repeat(12,1fr)}section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}.span12{grid-column:span 12}.span8{grid-column:span 8}.span6{grid-column:span 6}.span4{grid-column:span 4}.kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.kpi{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px}.kpi .num{font-weight:bold;font-size:20px;color:var(--blue);direction:ltr;text-align:left}.kpi .txt{font-size:12px;color:var(--muted)}h2{margin:0 0 10px;font-size:17px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tile{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px}.tile b{display:block;color:var(--blue);margin-bottom:5px}.small{font-size:13px;color:var(--muted)}.row{display:grid;grid-template-columns:150px 1fr;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}.label{color:var(--muted)}.value{direction:ltr;text-align:left;overflow-wrap:anywhere}.pass{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}table{width:100%;border-collapse:collapse;direction:ltr;text-align:left}th,td{padding:8px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}th{color:var(--muted);font-weight:normal}.cta{display:inline-block;margin-top:8px;padding:9px 12px;border-radius:10px;background:var(--blue);color:#07111f;text-decoration:none;font-weight:bold}@media(max-width:820px){header{padding:12px}h1{font-size:19px}.sub{font-size:12px}.nav{overflow-x:auto;flex-wrap:nowrap}.nav a{white-space:nowrap}main{padding:8px;grid-template-columns:1fr}.span12,.span8,.span6,.span4{grid-column:1}.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.value{text-align:right;direction:rtl}table{font-size:12px}}
</style>
</head>
<body>
<header>
  <h1>RANI OS Admin Control Room</h1>
  <div class="sub">Build 2026-07-03-CR-002 · חדר בקרה ראשי · NEW PATH CACHE BYPASS</div>
  <nav class="nav">
    <a href="control-room.html?v=20260703-cr002">Control Room</a>
    <a href="work-register.html?v=20260703-wr001">Work Register</a>
    <a href="#gate">Owner Gate</a>
    <a href="#lanes">Lanes</a>
    <a href="#health">Health</a>
  </nav>
</header>
<main>
  <section class="span12"><h2>מספרים כמותיים</h2><div class="kpis" id="top_kpis"><div class="warn">Loading KPIs...</div></div></section>
  <section class="span8"><h2>מצב מערכת עכשיו</h2><div id="control_state"></div></section>
  <section class="span4" id="gate"><h2>Owner Gate</h2><div id="owner_gate"></div></section>
  <section class="span12"><h2>Work Streams</h2><div class="grid" id="work_streams"></div></section>
  <section class="span6" id="lanes"><h2>Lane Status</h2><div id="lane_status"></div></section>
  <section class="span6" id="health"><h2>System Health</h2><div id="system_health"></div></section>
  <section class="span12"><h2>Next Action</h2><div id="next_action"></div><a class="cta" href="work-register.html?v=20260703-wr001">פתח Work Register מלא + חיפוש</a></section>
</main>
<script>
const stamp=Date.now();
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const row=(k,v)=>`<div class='row'><div class='label'>${esc(k)}</div><div class='value'>${esc(v)}</div></div>`;
const table=(list,cols)=>`<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>${(list||[]).map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c]??'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
Promise.all([fetch('state.json?v='+stamp,{cache:'no-store'}).then(r=>r.json()),fetch('managed-work.json?v='+stamp,{cache:'no-store'}).then(r=>r.json())]).then(([state,managed])=>{
  document.getElementById('top_kpis').innerHTML=(managed.top_kpis||[]).map(k=>`<div class='kpi'><div class='num'>${esc(k.value)}</div><div class='txt'>${esc(k.label)}</div></div>`).join('');
  document.getElementById('control_state').innerHTML=row('Source of Truth',state.system_status?.source_of_truth)+row('Active Work',state.current_work_item?.active_work_item)+row('Current Phase',state.current_work_item?.work_item_state)+row('Parked',state.execution_queue_detail?.deferred);
  document.getElementById('owner_gate').innerHTML=row('Gate',state.approval_center?.current_approval_card)+row('Required Action',state.approval_center?.required_owner_action)+row('Not Approved',state.approval_center?.not_approved);
  document.getElementById('work_streams').innerHTML=(managed.work_register_groups||[]).map(g=>`<div class='tile'><b>${esc(g.category)}</b><div>${esc(g.status)}</div><div class='small'>${esc(g.examples)}</div></div>`).join('');
  document.getElementById('lane_status').innerHTML=table(state.lanes||[],['name','status','count']);
  document.getElementById('system_health').innerHTML=row('Artifacts',managed.inventory_summary?.governed_artifacts_registered)+row('Capabilities',managed.inventory_summary?.capabilities_tracked)+row('Visible rows',managed.inventory_summary?.visible_register_rows)+row('Exact candidate count',managed.inventory_summary?.exact_candidate_count)+row('Full backlog manager',managed.inventory_summary?.full_backlog_manager)+row('Scheduler',managed.inventory_summary?.scheduler);
  document.getElementById('next_action').innerHTML=table(state.next_actions||[],['id','label','lane','recommended','status']);
}).catch(()=>{document.getElementById('control_state').innerHTML='<div class="bad">Could not load dashboard data</div>'});
</script>
</body>
</html>
