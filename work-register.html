<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RANI OS Work Register</title>
<style>
:root{--bg:#07111f;--card:#0d1b2e;--card2:#11243a;--text:#e8eef7;--muted:#9fb0c7;--border:#223855;--blue:#60a5fa;--bad:#fb7185}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;line-height:1.4}header{padding:16px;background:#08162a;border-bottom:1px solid var(--border)}h1{margin:0 0 4px;font-size:24px}.sub{color:var(--muted);font-size:14px}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.nav a{padding:8px 11px;border:1px solid var(--border);border-radius:999px;background:var(--card2);color:var(--text);text-decoration:none;font-size:13px}main{padding:14px;display:grid;gap:12px}section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}.kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.kpi{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px}.kpi .num{font-weight:bold;font-size:20px;color:var(--blue);direction:ltr;text-align:left}.kpi .txt{font-size:12px;color:var(--muted)}input,select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text)}.filters{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px}.card h3{margin:0 0 8px;font-size:16px;color:var(--blue);direction:ltr;text-align:left}.meta{display:grid;grid-template-columns:120px 1fr;gap:6px;padding:4px 0;border-top:1px solid rgba(255,255,255,.06)}.label{color:var(--muted);font-size:12px}.value{direction:ltr;text-align:left}.note{color:var(--muted);font-size:13px;margin-top:8px}@media(max-width:820px){header{padding:12px}h1{font-size:19px}.sub{font-size:12px}.nav{overflow-x:auto;flex-wrap:nowrap}.nav a{white-space:nowrap}.kpis{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.meta{grid-template-columns:90px 1fr}}
</style>
</head>
<body>
<header>
  <h1>RANI OS Work Register</h1>
  <div class="sub">Build 2026-07-03-WR-001 · רשומות עבודה מכל הסוגים · Searchable sanitized register</div>
  <nav class="nav"><a href="index.html?v=20260703-cr001">Control Room</a><a href="work-register.html?v=20260703-wr001">Work Register</a></nav>
</header>
<main>
  <section><h2>מספרים כמותיים</h2><div class="kpis" id="kpis"></div><div class="note">Exact full Candidate Register count is not generated yet; visible list is sanitized.</div></section>
  <section><h2>חיפוש וסינון רשומות</h2><div class="filters"><input id="q" placeholder="חיפוש לפי ID, שם, קטגוריה, lifecycle, status"><select id="category"><option value="">All categories</option></select><select id="lifecycle"><option value="">All lifecycles</option></select></div><div class="note" id="result_count"></div></section>
  <section><h2>כל הרשומות הגלויות</h2><div class="cards" id="rows"></div></section>
</main>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let rows=[];
function uniq(a){return [...new Set(a.filter(Boolean))].sort()}
function card(r){return `<article class='card'><h3>${esc(r.id)}</h3><div>${esc(r.title)}</div><div class='meta'><div class='label'>Category</div><div class='value'>${esc(r.category)}</div></div><div class='meta'><div class='label'>Lifecycle</div><div class='value'>${esc(r.lifecycle)}</div></div><div class='meta'><div class='label'>State</div><div class='value'>${esc(r.state)}</div></div><div class='meta'><div class='label'>Source</div><div class='value'>${esc(r.source)}</div></div></article>`}
function render(){const q=document.getElementById('q').value.toLowerCase().trim();const c=document.getElementById('category').value;const l=document.getElementById('lifecycle').value;const out=rows.filter(r=>(!q||Object.values(r).join(' ').toLowerCase().includes(q))&&(!c||r.category===c)&&(!l||r.lifecycle===l));document.getElementById('result_count').textContent=`Showing ${out.length} / ${rows.length} visible records`;document.getElementById('rows').innerHTML=out.map(card).join('')||'<div class="bad">No matching records</div>'}
fetch('managed-work.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(m=>{rows=m.register_rows||[];document.getElementById('kpis').innerHTML=(m.top_kpis||[]).map(k=>`<div class='kpi'><div class='num'>${esc(k.value)}</div><div class='txt'>${esc(k.label)}</div></div>`).join('');document.getElementById('category').innerHTML='<option value="">All categories</option>'+uniq(rows.map(r=>r.category)).map(x=>`<option>${esc(x)}</option>`).join('');document.getElementById('lifecycle').innerHTML='<option value="">All lifecycles</option>'+uniq(rows.map(r=>r.lifecycle)).map(x=>`<option>${esc(x)}</option>`).join('');['q','category','lifecycle'].forEach(id=>document.getElementById(id).addEventListener('input',render));render()}).catch(()=>{document.getElementById('rows').innerHTML='<div class="bad">Could not load managed-work.json</div>'});
</script>
</body>
</html>
