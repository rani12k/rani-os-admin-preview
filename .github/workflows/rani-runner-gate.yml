name: RANI Runner Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  runner-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt || true

      - name: Validate runner packet
        run: node tools/rani_runner.mjs validate --changed-files changed_files.txt
